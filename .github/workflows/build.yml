name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  VERSION: dev

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: 'go.mod'
        check-latest: true
    
    - name: Compile Binaries
      run: make all
    
    - name: Upload Artifact
      uses: actions/upload-artifact@v6
      with:
        name: f2fs-extractor
        path: out/
        compression-level: 9
